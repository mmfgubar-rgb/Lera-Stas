        // Countdown Timer Component
        function CountdownTimer() {
            const [timeLeft, setTimeLeft] = useState({ months: 0, weeks: 0, days: 0, hours: 0 });

            useEffect(() => {
                const calculateTimeLeft = () => {
                    const weddingDate = new Date('2026-09-05T14:00:00');
                    const now = new Date();
                    const difference = weddingDate.getTime() - now.getTime();

                    if (difference > 0) {
                        const totalDays = Math.floor(difference / (1000 * 60 * 60 * 24));
                        const months = Math.floor(totalDays / 30);
                        const remainingDaysAfterMonths = totalDays - (months * 30);
                        const weeks = Math.floor(remainingDaysAfterMonths / 7);
                        const days = remainingDaysAfterMonths % 7;
                        const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);

                        setTimeLeft({ months, weeks, days, hours });
                    }
                };

                calculateTimeLeft();
                const timer = setInterval(calculateTimeLeft, 1000 * 60 * 60);
                return () => clearInterval(timer);
            }, []);

            const timeUnits = [
                { value: timeLeft.months, label: timeLeft.months === 1 ? 'месяц' : timeLeft.months < 5 ? 'месяца' : 'месяцев' },
                { value: timeLeft.weeks, label: timeLeft.weeks === 1 ? 'неделя' : timeLeft.weeks < 5 ? 'недели' : 'недель' },
                { value: timeLeft.days, label: timeLeft.days === 1 ? 'день' : timeLeft.days < 5 ? 'дня' : 'дней' },
                { value: timeLeft.hours, label: timeLeft.hours === 1 ? 'час' : timeLeft.hours < 5 ? 'часа' : 'часов' }
            ];

            return (
                <section className="py-16 md:py-24 bg-[#F5F1E8]">
                    <div className="max-w-6xl mx-auto px-4">
                        <h2 className="text-center mb-12 text-2xl md:text-3xl" style={{ fontFamily: "'Playfair Display', serif", color: '#6B5D52' }}>
                            До нашей свадьбы осталось:
                        </h2>

                                    <div className="text-4xl md:text-5xl font-bold mb-2" style={{ fontFamily: "'Playfair Display', serif", color: '#D4A574' }}>

                                    <div className="text-sm md:text-base" style={{ fontFamily: "'Montserrat', sans-serif", color: '#8B7D6B', textTransform: 'lowercase' }}>
                                        {unit.label}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // RSVP Form Component
        function RSVPForm() {
            const [formData, setFormData] = useState({
                name: '',
                attending: '',
                withFamily: '',
                guestCount: '',
                alcoholPreferences: [],
                wishes: ''
            });
            
            const [errors, setErrors] = useState({ name: false });
            const [submitted, setSubmitted] = useState(false);

            const alcoholOptions = [
                'Красное вино',
                'Белое вино',
                'Шампанское',
                'Виски',
                'Водка',
                'Не пью'
            ];

            const handleSubmit = (e) => {
                e.preventDefault();
                
                if (!formData.name.trim()) {
                    setErrors({ name: true });
                    return;
                }

                // Отправка данных в Google Таблицу
                const sendToGoogleSheets = async () => {
                    const scriptURL = 'https://script.google.com/macros/s/AKfycbxgRzOGZ1svNalo9--R9TnChYmGb56za4b02ZnnA4OM1zrT3MolKEnjaAUsuC7_L1yU/exec';
                    
                    const dataToSend = {
                        timestamp: new Date().toLocaleString('ru-RU', { 
                            timeZone: 'Europe/Minsk',
                            year: 'numeric',
                            month: '2-digit',
                            day: '2-digit',
                            hour: '2-digit',
                            minute: '2-digit'
                        }),
                        name: formData.name,
                        attending: formData.attending === 'yes' ? 'Приду' : 'Не приду',
                        withFamily: formData.attending === 'yes' 
                            ? (formData.withFamily === 'alone' ? 'Один/одна' : 'С семьей')
                            : '-',
                        guestCount: formData.withFamily === 'family' ? formData.guestCount : '-',
                        alcoholPreferences: formData.attending === 'yes' 
                            ? (formData.alcoholPreferences.length > 0 ? formData.alcoholPreferences.join(', ') : '-')
                            : '-',
                        wishes: formData.wishes || '-'
                    };

                    try {
                        const response = await fetch(scriptURL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(dataToSend)
                        });
                        
                        console.log('Данные отправлены в Google Таблицу');
                    } catch (error) {
                        console.error('Ошибка отправки:', error);
                    }
                };

                sendToGoogleSheets();
                
                console.log('Form submitted:', formData);
                setSubmitted(true);
            };

            const toggleAlcoholPreference = (option) => {
                setFormData(prev => ({
                    ...prev,
                    alcoholPreferences: prev.alcoholPreferences.includes(option)
                        ? prev.alcoholPreferences.filter(item => item !== option)
                        : [...prev.alcoholPreferences, option]
                }));
            };

            if (submitted) {
                return (
                    <section id="rsvp" className="py-16 md:py-24 bg-white">
                        <div className="max-w-2xl mx-auto px-4">
                            <div className="text-center p-8 md:p-12 bg-[#F5F1E8] rounded-lg shadow-lg animate-fade-in">
                                <svg className="w-16 h-16 mx-auto mb-6" fill="none" stroke="#7BA05B" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <h2 className="text-2xl md:text-3xl mb-4" style={{ fontFamily: "'Playfair Display', serif", color: '#6B5D52' }}>
                                    Спасибо!
                                </h2>
                                <p className="text-base md:text-lg" style={{ fontFamily: "'Montserrat', sans-serif", color: '#8B7D6B' }}>
                                    Мы получили ваш ответ и будем рады видеть вас на нашей свадьбе.
                                </p>
                            </div>
                        </div>
                    </section>
                );
            }

            return (
                <section id="rsvp" className="py-16 md:py-24 bg-white">
                    <div className="max-w-2xl mx-auto px-4">
                        <div className="text-center mb-12">
                            <svg className="w-12 h-12 mx-auto mb-4" fill="#D4A574" viewBox="0 0 24 24">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            <h2 className="text-3xl md:text-4xl mb-4" style={{ fontFamily: "'Playfair Display', serif", color: '#6B5D52' }}>
                                Пожалуйста, подтвердите ваше присутствие
                            </h2>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label htmlFor="name" className="text-base mb-2 block" style={{ fontFamily: "'Montserrat', sans-serif", color: '#6B5D52' }}>
                                    Имя и фамилия *
                                </label>
                                <input
                                    id="name"
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => {
                                        setFormData({ ...formData, name: e.target.value });
                                        setErrors({ name: false });
                                    }}
                                    className={errors.name ? 'error' : ''}
                                />
                                {errors.name && (
                                    <p className="text-red-500 text-sm mt-1">Пожалуйста, укажите имя и фамилию</p>
                                )}
                            </div>

                            <div>
                                <label className="text-base mb-3 block" style={{ fontFamily: "'Montserrat', sans-serif", color: '#6B5D52' }}>
                                    Приду или не приду *
                                </label>
                                <div className="radio-item">
                                    <input
                                        type="radio"
                                        id="yes"
                                        name="attending"
                                        value="yes"
                                        checked={formData.attending === 'yes'}
                                        onChange={(e) => setFormData({ ...formData, attending: e.target.value })}
                                        disabled={!formData.name.trim()}
                                    />
                                    <label htmlFor="yes" className={!formData.name.trim() ? 'disabled' : ''}>Приду</label>
                                </div>
                                <div className="radio-item">
                                    <input
                                        type="radio"
                                        id="no"
                                        name="attending"
                                        value="no"
                                        checked={formData.attending === 'no'}
                                        onChange={(e) => setFormData({ ...formData, attending: e.target.value })}
                                        disabled={!formData.name.trim()}
                                    />
                                    <label htmlFor="no" className={!formData.name.trim() ? 'disabled' : ''}>К сожалению, не смогу прийти</label>
                                </div>
                            </div>

                            {formData.attending === 'yes' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div>
                                        <label className="text-base mb-3 block" style={{ fontFamily: "'Montserrat', sans-serif", color: '#6B5D52' }}>
                                            Вы придете один или с семьей?
                                        </label>
                                        <div className="radio-item">
                                            <input
                                                type="radio"
                                                id="alone"
                                                name="withFamily"
                                                value="alone"
                                                checked={formData.withFamily === 'alone'}
                                                onChange={(e) => setFormData({ ...formData, withFamily: e.target.value })}
                                            />
                                            <label htmlFor="alone">Один / одна</label>
                                        </div>
                                        <div className="radio-item">
                                            <input
                                                type="radio"
                                                id="family"
                                                name="withFamily"
                                                value="family"
                                                checked={formData.withFamily === 'family'}
                                                onChange={(e) => setFormData({ ...formData, withFamily: e.target.value })}
                                            />
                                            <label htmlFor="family">С семьей</label>
                                        </div>
                                    </div>

                                    {formData.withFamily === 'family' && (
                                        <div className="animate-fade-in">
                                            <label htmlFor="guestCount" className="text-base mb-2 block" style={{ fontFamily: "'Montserrat', sans-serif", color: '#6B5D52' }}>
                                                Сколько человек будет присутствовать?
                                            </label>
                                            <input
                                                id="guestCount"
                                                type="number"
                                                min="1"
                                                value={formData.guestCount}
                                                onChange={(e) => setFormData({ ...formData, guestCount: e.target.value })}
                                            />
                                        </div>
                                    )}

                                    <div>
                                        <label className="text-base mb-3 block" style={{ fontFamily: "'Montserrat', sans-serif", color: '#6B5D52' }}>
                                            Какой алкоголь вы предпочитаете?
                                        </label>
                                        <div className="space-y-2">
                                            {alcoholOptions.map((option) => (
                                                <div key={option} className="checkbox-item">
                                                    <input
                                                        type="checkbox"
                                                        id={option}
                                                        checked={formData.alcoholPreferences.includes(option)}
                                                        onChange={() => toggleAlcoholPreference(option)}
                                                    />
                                                    <label htmlFor={option}>{option}</label>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label htmlFor="wishes" className="text-base mb-2 block" style={{ fontFamily: "'Montserrat', sans-serif", color: '#6B5D52' }}>
                                            Пожелание молодоженам
                                        </label>
                                        <textarea
                                            id="wishes"
                                            value={formData.wishes}
                                            onChange={(e) => setFormData({ ...formData, wishes: e.target.value })}
                                            rows="4"
                                            placeholder="Ваши пожелания..."
                                        ></textarea>
                                    </div>
                                </div>
                            )}

                            <button type="submit" className="btn-primary w-full hover-scale" disabled={!formData.name.trim()}>
                                ОТПРАВИТЬ ОТВЕТ
                            </button>
                        </form>
                    </div>
                </section>
            );
        }

        // Main App Component
        function App() {
            const rsvpRef = useRef(null);

            const scrollToRSVP = () => {
                rsvpRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen">
                    <HeroSection onRSVPClick={scrollToRSVP} />
                    <CountdownTimer />
                    <PhotoSection />
                    <EventInfo />
                    <DressCode />
                    <div ref={rsvpRef}>
                        <RSVPForm />
                    </div>
                    
                    <footer className="py-8 bg-[#6B5D52] text-center">
                        <p className="text-white text-sm" style={{ fontFamily: "'Montserrat', sans-serif" }}>
                            С любовью, Валерия & Стас ♥
                        </p>
                    </footer>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
